<style>
#rec2436501631 { display: none !important; }
.my-slider-window {
    width: 100% !important;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    box-sizing: border-box;
    max-width: 1605px;
    margin: 0 auto;
}
.my-slider-window::-webkit-scrollbar {display: none;}
.my-slider-window {-ms-overflow-style: none;scrollbar-width: none;  }
.my-slider-track {display: flex !important;flex-direction: row !important;flex-wrap: nowrap !important;width: max-content !important;gap: 40px !important;}
.my-news-card {
    position: relative !important;
    top: auto !important;
    left: auto !important;
    display: flex;
    flex-direction: column !important;
    flex-shrink: 0 !important;
}
.my-news-card .t396__elem {position: relative !important;}
.js-slider-prev, .js-slider-next {cursor: pointer !important;}
.news_title_box {display: block;max-width: 1605px;margin: 0 auto;}
#rec2436517091 .tn-group[data-group-id="1783000031783000006"].news_title_box {width: 100%;position: static;}
.more_link:hover {text-decoration: underline;}
@media (max-width: 1210px) {.my-slider-track {gap: 20px !important;}}
</style>

<script>
function showNews() {
    var zeroBlockId = '#rec2436517091';
    var hiddenNewsBlockId = '#rec2436501631';
    var zeroBlock = document.querySelector(zeroBlockId);
    var hiddenBlock = document.querySelector(hiddenNewsBlockId);
    if (!zeroBlock || !hiddenBlock) return;
    var standardNews = hiddenBlock.querySelectorAll('.js-feed-post');
    if (standardNews.length === 0) return;
    var zeroContainer = zeroBlock.querySelector('.t396__artboard');
    var originalCard = zeroBlock.querySelector('.my-news-card');
    if (!originalCard) return;

    // Создаем структуру слайдера
    var sliderWindow = document.createElement('div');
    sliderWindow.className = 'my-slider-window';
    var sliderTrack = document.createElement('div');
    sliderTrack.className = 'my-slider-track';
    sliderWindow.appendChild(sliderTrack);
    zeroContainer.appendChild(sliderWindow);
    // Прячем исходный шаблон
    originalCard.style.display = 'none';
    
    standardNews.forEach(function(post) {
        var title = post.querySelector('.js-feed-post-title')?.innerText || '';
        var text = post.querySelector('.js-feed-post-descr')?.innerText || '';
        var img = post.querySelector('.t-feed__post-bgimg');
        var imgUrlOriginal = img?.getAttribute('data-original') || '';
        var imgUrl = img?.style.backgroundImage || '';
        var newsLink = post.querySelector('a')?.getAttribute('href') || '#';
        var clonedCard = originalCard.cloneNode(true);
        clonedCard.style.display = 'flex'; 

        // Заполняем клон данными
        var cTitle = clonedCard.querySelector('.js-custom-news-title .tn-atom');
        if (cTitle) cTitle.innerText = title;
        var cText = clonedCard.querySelector('.js-custom-news-description .tn-atom');
        if (cText) cText.innerText = text;
        var cImg = clonedCard.querySelector('.js-custom-news-img .tn-atom');
        if (cImg && imgUrl) {
            cImg.setAttribute('data-original', imgUrlOriginal);
            cImg.style.backgroundImage = 'url("'+imgUrlOriginal+'")';
            cImg.style.backgroundSize = 'cover';
            cImg.style.backgroundPosition = 'center';
        }
        clonedCard.setAttribute('href', newsLink);
        clonedCard.querySelectorAll('.t396__elem').forEach(function(el) {
            el.style.left = 'auto';
            el.style.top = 'auto';
        });
        sliderTrack.appendChild(clonedCard);
    });

    var btnPrev = zeroBlock.querySelector('.js-slider-prev');
    var btnNext = zeroBlock.querySelector('.js-slider-next');
    var scrollStep = 450;
    var maxScrollNews = sliderWindow.scrollWidth - sliderWindow.clientWidth;

    if (btnNext) {
        btnNext.addEventListener('click', function() {
            if (sliderWindow.scrollLeft + scrollStep >= maxScrollNews) {
                btnNext.classList.add('disabled');
            } else {
                btnNext.classList.remove('disabled');
                btnPrev.classList.remove('disabled');
            }
            sliderWindow.scrollLeft += scrollStep;
        });
    }

    if (btnPrev) {
        btnPrev.addEventListener('click', function() {
            if (sliderWindow.scrollLeft - scrollStep <= 0) {
                btnPrev.classList.add('disabled');
            } else {
                btnNext.classList.remove('disabled');
                btnPrev.classList.remove('disabled');
            }
            sliderWindow.scrollLeft -= scrollStep;
        });
    }

    var cardHeight = originalCard.offsetHeight || 450; 
    var totalHeight = cardHeight + 160;
    zeroContainer.style.height = totalHeight + 'px';
    zeroContainer.style.overflow = 'hidden';
    zeroBlock.querySelector('.t396__carrier').style.height = totalHeight + 'px';
    observerNews.disconnect();
};
var observerNews = new MutationObserver(function(mutations) { showNews(); });
document.addEventListener("DOMContentLoaded", function() {
    var targetBlock = document.querySelector('#rec2436501631');
    if (targetBlock) observerNews.observe(targetBlock, { childList: true, subtree: true });
    showNews();
});
</script>
