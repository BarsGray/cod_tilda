<style>#rec2470160591 { display: none !important; }</style>
<script>
function startCloning() {
    var zeroBlockId = '#rec2470083011';
    var zeroBlock = document.querySelector(zeroBlockId);
    var standardProducts = document.querySelector('#rec2470160591');

    if (!zeroBlock || !standardProducts) return;
    var standardProd = standardProducts.querySelectorAll('.js-feed-post');
    if (standardProd.length < 2) return; 
    
    if (zeroBlock.classList.contains('js-already-cloned')) return;
    zeroBlock.classList.add('js-already-cloned');

    var zeroContainer = zeroBlock.querySelector('.t396__artboard');
    var gridContainer = zeroBlock.querySelector('.t396__artboard .glav_catalog_container');
    var originalCard = zeroBlock.querySelector('.my-product-card');

    if (!originalCard) return;
    originalCard.style.display = 'none';
    
    standardProd.forEach(function(product) {
        var titleElement = product.querySelector('.js-feed-post-title');
        var title = titleElement ? titleElement.innerText : '';
        var textElement = product.querySelector('.js-feed-post-descr');
        var text = textElement ? textElement.innerText : '';
        var realProductLink = product.querySelector('a')?.getAttribute('href') || '#';
        var imgUrl = product.querySelector('.t-feed__post-bgimg')?.getAttribute('data-original') || '';
        
        var clonedCard = originalCard.cloneNode(true);
        clonedCard.style.display = 'block'; 

        var cTitle = clonedCard.querySelectorAll('.js-custom-title .tn-atom');
        cTitle.forEach(function(el) { el.innerText = title; });
        var cText = clonedCard.querySelector('.js-custom-description .tn-atom');
        if (cText) cText.innerText = text;
        var cBtn = clonedCard.querySelector('.my_btn_ob_prod .tn-atom');
        if (cBtn) cBtn.href = realProductLink;
        var cImg = clonedCard.querySelector('.js-custom-img .tn-atom');
        if (cImg && imgUrl) {
          cImg.style.backgroundImage = 'url("' + imgUrl + '")';
          cImg.setAttribute('data-original', imgUrl);
        }

        gridContainer.appendChild(clonedCard);
    });

    gridContainer.style.height = 'auto';
    gridContainer.style.width = '100%';
    zeroContainer.style.height = 'auto';
    gridContainer.style.position = 'relative';
    zeroBlock.querySelector('.t396__carrier').style.height = 'auto';
    observerProd.disconnect();
}

var observerProd = new MutationObserver(function(mutations) { startCloning(); });

document.addEventListener("DOMContentLoaded", function() {
    var targetBlock = document.querySelector('#rec2470160591');
    if (targetBlock) observerProd.observe(targetBlock, { childList: true, subtree: true });
    startCloning();
});
</script>
