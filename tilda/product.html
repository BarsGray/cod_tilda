<script>
document.addEventListener("DOMContentLoaded", function() {
    // ВСТАВЬТЕ СЮДА ID ВАШЕГО ZERO BLOCK:
    var zeroID = '#rec87654321'; 
    
    var zeroBlock = document.querySelector(zeroID);
    var hiddenBlock = document.querySelector('.js-store'); // Находит скрытый ST310N
    
    if (!zeroBlock || !hiddenBlock) return;
    
    var products = hiddenBlock.querySelectorAll('.js-product');
    var artboard = zeroBlock.querySelector('.t396__artboard');
    
    // Получаем оригинальные элементы шаблона из Zero Block
    var tImg = zeroBlock.querySelector('.js-custom-img');
    var tTitle = zeroBlock.querySelector('.js-custom-title');
    var tText = zeroBlock.querySelector('.js-custom-text');
    var tPrice = zeroBlock.querySelector('.js-custom-price');
    var tBtn = zeroBlock.querySelector('.js-custom-btn');
    
    if(!tTitle) return;

    // Скрываем первоначальные шаблонные элементы, чтобы они не дублировались
    if(tImg) tImg.style.display = 'none';
    tTitle.style.display = 'none';
    if(tText) tText.style.display = 'none';
    if(tPrice) tPrice.style.display = 'none';
    if(tBtn) tBtn.style.display = 'none';

    // Настройки сетки (плитки)
    var cardsPerRow = 3;       // Количество товаров в один ряд
    var offsetX = 360;         // Расстояние между карточками по горизонтали (в пикселях)
    var offsetY = 450;         // Расстояние между рядами по вертикали (в пикселях)
    
    var startTop = parseFloat(tTitle.style.top);
    var startLeft = parseFloat(tTitle.style.left);

    products.forEach(function(prod, index) {
        var pTitle = prod.querySelector('.js-store-prod-title')?.innerText || '';
        var pText = prod.querySelector('.js-store-prod-text')?.innerText || '';
        var pPrice = prod.querySelector('.js-store-prod-price')?.innerText || '';
        var pImg = prod.querySelector('.js-store-prod-img')?.getAttribute('data-original') || '';
        var pId = prod.getAttribute('data-product-id');
        
        // Считаем координаты для сетки
        // var row = Math.floor(index / cardsPerRow);
        // var col = index % cardsPerRow;
        
        // var currentOffsetX = col * offsetX;
        // var currentOffsetY = row * offsetY;

        // Клонируем и позиционируем Название
        var cloneTitle = tTitle.cloneNode(true);
        cloneTitle.innerText = pTitle;
        // cloneTitle.style.display = 'block';
        // cloneTitle.style.left = (parseFloat(tTitle.style.left) + currentOffsetX) + 'px';
        // cloneTitle.style.top = (parseFloat(tTitle.style.top) + currentOffsetY) + 'px';
        artboard.appendChild(cloneTitle);

        // Клонируем и позиционируем Текст описания
        if (tText) {
            var cloneText = tText.cloneNode(true);
            cloneText.innerText = pText;
            cloneText.style.display = 'block';
            cloneText.style.left = (parseFloat(tText.style.left) + currentOffsetX) + 'px';
            cloneText.style.top = (parseFloat(tText.style.top) + currentOffsetY) + 'px';
            artboard.appendChild(cloneText);
        }

        // Клонируем и позиционируем Картинку
        if (tImg) {
            var cloneImg = tImg.cloneNode(true);
            var imgTag = cloneImg.querySelector('img');
            if(imgTag) imgTag.src = pImg;
            cloneImg.style.display = 'block';
            cloneImg.style.left = (parseFloat(tImg.style.left) + currentOffsetX) + 'px';
            cloneImg.style.top = (parseFloat(tImg.style.top) + currentOffsetY) + 'px';
            artboard.appendChild(cloneImg);
        }

        // Клонируем и позиционируем Цену
        if (tPrice) {
            var clonePrice = tPrice.cloneNode(true);
            clonePrice.innerText = pPrice;
            clonePrice.style.display = 'block';
            clonePrice.style.left = (parseFloat(tPrice.style.left) + currentOffsetX) + 'px';
            clonePrice.style.top = (parseFloat(tPrice.style.top) + currentOffsetY) + 'px';
            artboard.appendChild(clonePrice);
        }

        // Клонируем и позиционируем Кнопку «Купить»
        if (tBtn) {
            var cloneBtn = tBtn.cloneNode(true);
            var linkTag = cloneBtn.querySelector('a') || cloneBtn;
            linkTag.setAttribute('href', '#order:#!/tproduct/' + pId);
            cloneBtn.style.display = 'block';
            cloneBtn.style.left = (parseFloat(tBtn.style.left) + currentOffsetX) + 'px';
            cloneBtn.style.top = (parseFloat(tBtn.style.top) + currentOffsetY) + 'px';
            artboard.appendChild(cloneBtn);
        }
    });
    
    // Автоматически увеличиваем высоту Zero Block под количество рядов товаров
    var totalRows = Math.ceil(products.length / cardsPerRow);
    var newHeight = totalRows * offsetY + 100; 
    artboard.style.height = newHeight + 'px';
    zeroBlock.querySelector('.t396__carrier').style.height = newHeight + 'px';
});
</script>
