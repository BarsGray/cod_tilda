      if (sliderSertItemImg && imgUrl) {

      sliderSertItemDiv.appendChild(sliderSertItemImg);
      sliderTrack.appendChild(sliderSertItemDiv);

    sliderWindow.appendChild(sliderPagination);

    // sliderTrack.appendChild(sliderTrack);

    // // Шаг прокрутки: ширина карточки (320px) + расстояние gap (30px) = 350px
    // var scrollStep = 450; 

    // if (btnNext) {

    //     sliderWindow.scrollLeft += scrollStep;
    //   });
    // }

    // if (btnPrev) {

    //     sliderWindow.scrollLeft -= scrollStep;

    // zeroContainer.style.height = totalHeight + 'px';

    observerSert.disconnect();

    new Swiper('.my-slider-sert', {
      slidesPerView: 4,
      slidesPerGroup: 4,
      spaceBetween: 30,
      navigation: {
        nextEl: "#rec2440338951 .js-slider-next",
        prevEl: "#rec2440338951 .js-slider-prev",
      },
      pagination: {
        el: ".slider__pagination",
        clickable: true,
      },
      // breakpoints: {
      //   890: {

    });
  };

  var observerSert = new MutationObserver(function(mutations) {showSertifficat();});

  document.addEventListener("DOMContentLoaded", function() {
    var targetBlockSert = document.querySelector('#rec2440234011');
    if (targetBlockSert) observerSert.observe(targetBlockSert, {childList: true, subtree: true});
    showSertifficat();
