<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
<style>
  #rec2440234011 {
    display: none !important;
  }
  #rec2440338951 .t396__artboard {
    height: fit-content;
  }
  .sert_slider_item {
    width: 363px;
    max-height: 516px;
    overflow: hidden;
    border-radius: 10px;
    height: unset;
  }
  .sert_slider_img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .swiper {
    padding-bottom: 80px;
  }
  .slider__pagination {
    --swiper-pagination-bottom: 0;
  }
  .swiper-pagination-bullet {
    --swiper-pagination-bullet-horizontal-gap: 10px;
    --swiper-pagination-color: #f2f2f2;
    width: 15px;
    height: 15px;
  }
  @media (max-width: 1210px) {
    .swiper {
      padding-bottom: 60px;
    }
  }
</style>
<script>
    
  function showSertifficat() {
    // 1. УКАЖИТЕ ID ВАШЕГО ZERO BLOCK И БЛОКА ПОТОКОВ
    var zeroBlockId = '#rec2440338951'; 
    var hiddenSertifficatBlockId = '#rec2440234011';
    var zeroBlock = document.querySelector(zeroBlockId);
    var hiddenBlock = document.querySelector(hiddenSertifficatBlockId);
    if (!zeroBlock || !hiddenBlock) return;
    var standardSert = hiddenBlock.querySelectorAll('.t214__blockimg.t-bgimg');
    if (standardSert.length === 0) return;
    var zeroContainer = zeroBlock.querySelector('.t396__artboard');

    // Создаем структуру слайдера
    var sliderWindow = document.createElement('div');
    sliderWindow.className = 'my-slider-sert swiper';
    var sliderTrack = document.createElement('div');
    sliderTrack.className = 'my-slider-sert-track swiper-wrapper';
    var sliderPagination = document.createElement('div');
    sliderPagination.className = 'swiper-pagination slider__pagination';
    
    sliderWindow.appendChild(sliderTrack);
    zeroContainer.appendChild(sliderWindow);
    
    standardSert.forEach(function(img) {
      
      var imgUrlOriginal = img?.getAttribute('data-original') || '';
      var imgUrl = img?.style.backgroundImage || '';
      var sliderSertItemDiv = document.createElement('div');
      var sliderSertItemLink = document.createElement('a');
      sliderSertItemDiv.className = 'sert_slider_item swiper-slide';
      var sliderSertItemImg = document.createElement('img');
      sliderSertItemImg.classList.add('sert_slider_img');

      if (sliderSertItemImg && imgUrl) {
        sliderSertItemImg.setAttribute('src', imgUrlOriginal);
        sliderSertItemLink.setAttribute('href', imgUrlOriginal);
        sliderSertItemLink.setAttribute('target', '_blank');
      }
      sliderSertItemLink.appendChild(sliderSertItemImg);
      sliderSertItemDiv.appendChild(sliderSertItemLink);
      sliderTrack.appendChild(sliderSertItemDiv);
    });
    sliderWindow.appendChild(sliderPagination);
    observerSert.disconnect();
    new Swiper('.my-slider-sert', {
      slidesPerView: 4,
      slidesPerGroup: 4,
      spaceBetween: 30,
      navigation: {
        nextEl: "#rec2440338951 .js-slider-next",
        prevEl: "#rec2440338951 .js-slider-prev",
      },
      pagination: {
        el: ".slider__pagination",
        clickable: true,
      },
      breakpoints: {
        700: {
          slidesPerView: 4,
          slidesPerGroup: 4,
          spaceBetween: 30,
        },
        380: {
          slidesPerView: 2,
          slidesPerGroup: 2,
          spaceBetween: 20,
        }
      },
    });
  };
  var observerSert = new MutationObserver(function(mutations) {showSertifficat();});
  document.addEventListener("DOMContentLoaded", function() {
    var targetBlockSert = document.querySelector('#rec2440234011');
    if (targetBlockSert) observerSert.observe(targetBlockSert, {childList: true, subtree: true});
    showSertifficat();
  });
</script>
