<style>
/* Скрываем стандартный блок каталога, но оставляем его доступным для скрипта */
#rec2430353611 {
    display: none !important;
}
</style>

<script>
function startCloning() {
    var zeroBlockId = '#rec2432125021';
    var zeroBlock = document.querySelector(zeroBlockId);
    var standardProducts = document.querySelector('#rec2430353611');

    if (!zeroBlock || !standardProducts) return;
    // Находим ВСЕ товары внутри блока
    var standardProd = standardProducts.querySelectorAll('.js-product.t-store__card');
    
    // Если Tilda еще не успела подгрузить все товары, выходим и ждем дальше
    if (standardProd.length < 2) return; 
    
    // Чтобы скрипт не сработал дважды, ставим маркер
    if (zeroBlock.classList.contains('js-already-cloned')) return;
    zeroBlock.classList.add('js-already-cloned');


    var zeroContainer = zeroBlock.querySelector('.t396__artboard');
    var gridContainer = zeroBlock.querySelector('.t396__artboard .glav_catalog_container');
    var originalCard = zeroBlock.querySelector('.my-product-card'); // Шаблон в Zero Block    

    if (!originalCard) return;

    // Создаем специальный контейнер-сетку внутри Zero Block
    // var gridContainer = document.createElement('div');
    // gridContainer.className = 'my-products-grid';
    // zeroContainer.appendChild(gridContainer);
    
    // ИСПРАВЛЕНО: Убрано двойное .style
    originalCard.style.display = 'none';
    
    // Перебираем коллекцию товаров
    standardProd.forEach(function(product) {
        // 1. НАЗВАНИЕ: Проверяем оба возможных класса Tilda
        var titleElement = product.querySelector('.js-store-prod-name') || product.querySelector('.js-store-prod-title');
        var title = titleElement ? titleElement.innerText : '';
        // 2. ТЕКСТ / ОПИСАНИЕ
        var textElement = product.querySelector('.js-store-prod-descr.t-store__card__descr');
        var text = textElement ? textElement.innerText : '';
        // 1. Вытаскиваем из скрытого каталога реальную сгенерированную ссылку на страницу товара
        var realProductLink = product.querySelector('a[href*="/tproduct/"]')?.getAttribute('href') || '#';
        // 3. ЦЕНА: Ищем чистую стоимость
        var priceElement = product.querySelector('.js-store-prod-price-val') || product.querySelector('.js-store-prod-price');
        var price = priceElement ? priceElement.innerText + ' р.' : '';
        // 4. КАРТИНКА: Пытаемся вытащить из data-original (для обычных сеток)
        var imgUrl = product.querySelector('.js-product-img.t-store__card__bgimg')?.getAttribute('data-original') || '';
        // 5. ID ТОВАРА для привязки к кнопке добавления в корзину
        var prodId = product.getAttribute('data-product-id');
        if (!prodId) {
            var buyBtn = product.querySelector('a[href*="#order"]');
            if (buyBtn) {
                var href = buyBtn.getAttribute('href');
                prodId = href.split('/').pop() || '';
            }
        }
        
        // КЛОНИРОВАНИЕ КАРТОЧКИ
        var clonedCard = originalCard.cloneNode(true);
        clonedCard.style.display = 'block'; 

        // // Заполняем клон данными
        var cTitle = clonedCard.querySelectorAll('.js-custom-title .tn-atom');
        cTitle.forEach(function(el) {
          el.innerText = title;
        });

        var cText = clonedCard.querySelector('.js-custom-description .tn-atom');
        if (cText) cText.innerText = text;

        var cBtn = clonedCard.querySelector('.my_btn_ob_prod .tn-atom');
        if (cBtn) cBtn.href = realProductLink;
        // var cPrice = clonedCard.querySelector('.js-custom-price');
        // if (cPrice) cPrice.innerText = price;

        var cImg = clonedCard.querySelector('.js-custom-img .tn-atom');
        if (cImg && imgUrl) {
          cImg.style.backgroundImage = 'url("' + imgUrl + '")';
          // cImg.style.backgroundPosition = 'right center';
          // cImg.style.backgroundSize = 'cover';
          cImg.setAttribute('data-original', imgUrl);
        }

        // Связываем кнопку с корзиной
        // var cBtn = clonedCard.querySelector('.js-custom-btn a') || clonedCard.querySelector('.js-custom-btn');
        // if (cBtn && prodId) {
        //     cBtn.setAttribute('href', '#order:#!/tproduct/' + prodId);
        // }

        // // Скидываем жесткие координаты Tilda внутри элементов клона для работы CSS Grid
        // clonedCard.querySelectorAll('.t396__elem').forEach(function(el) {
        //     el.style.left = 'auto';
        //     el.style.top = 'auto';
        // });

        // Помещаем готовый клон в вашу CSS-сетку
        gridContainer.appendChild(clonedCard);
    });

    // Делаем высоту самого Zero Block автоматической
    gridContainer.style.height = 'auto';
    gridContainer.style.width = '100%';
    zeroContainer.style.height = 'auto';
    gridContainer.style.position = 'relative';
    // zeroContainer.style.overflow = 'hidden';
    // gridContainer.style.position = 'relative';
    zeroBlock.querySelector('.t396__carrier').style.height = 'auto';
    
    // Отключаем слежку, так как всё успешно отрендерилось
    observer.disconnect();
}

// СОЗДАНИЕ НАБЛЮДАТЕЛЯ (MutationObserver)
// Он лежит здесь, во внешней области видимости, чтобы startCloning() мог его отключить через disconnect()
var observer = new MutationObserver(function(mutations) {
    startCloning();
});

document.addEventListener("DOMContentLoaded", function() {
    var targetBlock = document.querySelector('#rec2430353611');
    if (targetBlock) {
        // Говорим наблюдателю следить за изменениями внутри скрытого блока каталога
        observer.observe(targetBlock, { childList: true, subtree: true });
    }
    // На случай, если товары УЖЕ были в DOM на момент загрузки скрипта
    startCloning();
});
</script>
